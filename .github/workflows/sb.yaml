name: Build & Release Simulator App (iPhone + iPad)

on:
  push:
    tags:
      - 'V*'

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      APP_NAME: DemoApp
      SCHEME_NAME: DemoApp
      PROJECT_NAME: DemoApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#V}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install xcodegen
        run: brew install xcodegen

      # 为 iPhone 创建专用 Info.plist
      - name: Create Info.plist (iPhone)
        run: |
          cat > Info-iphone.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ steps.version.outputs.version }}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

      # 为 iPad 创建专用 Info.plist
      - name: Create Info.plist (iPad)
        run: |
          cat > Info-ipad.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ steps.version.outputs.version }}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>2</integer>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Generate project.yml
        run: |
          cat > project.yml << 'EOF'
          name: DemoApp
          options:
            bundleIdPrefix: com.example
            deploymentTarget:
              iOS: "16.0"
          targets:
            DemoApp:
              type: application
              platform: iOS
              sources:
                - path: .
                  includes:
                    - "1.swift"
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.example.demoapp
                  SWIFT_VERSION: "5.0"
          EOF

      - name: Generate Xcode project and fix format
        run: |
          xcodegen generate --spec project.yml
          sed -i '' 's/objectVersion = 77;/objectVersion = 56;/g' DemoApp.xcodeproj/project.pbxproj

      # ----- 构建 iPhone 版本 -----
      - name: Build iPhone version
        run: |
          xcodebuild \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME_NAME" \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build-iphone \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            INFOPLIST_FILE="Info-iphone.plist" \
            TARGETED_DEVICE_FAMILY=1

      - name: Package iPhone as ZIP
        id: package-iphone
        run: |
          APP_PATH=$(find ./build-iphone/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::iPhone .app not found"
            exit 1
          fi
          ZIP_NAME="$APP_NAME-${{ steps.version.outputs.version }}-simulator-iphone.zip"
          zip -r "$ZIP_NAME" "$APP_PATH"
          echo "iphone_zip=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      # ----- 构建 iPad 版本 -----
      - name: Build iPad version
        run: |
          xcodebuild \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME_NAME" \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build-ipad \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            INFOPLIST_FILE="Info-ipad.plist" \
            TARGETED_DEVICE_FAMILY=2

      - name: Package iPad as ZIP
        id: package-ipad
        run: |
          APP_PATH=$(find ./build-ipad/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::iPad .app not found"
            exit 1
          fi
          ZIP_NAME="$APP_NAME-${{ steps.version.outputs.version }}-simulator-ipad.zip"
          zip -r "$ZIP_NAME" "$APP_PATH"
          echo "ipad_zip=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      # 同时上传两个 zip
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.package-iphone.outputs.iphone_zip }}
            ${{ steps.package-ipad.outputs.ipad_zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
