name: Build & Release iOS App

on:
  push:
    tags:
      - 'V*'

jobs:
  build-and-release:
    runs-on: macos-latest

    env:
      APP_NAME: DemoApp
      PROJECT_NAME: DemoApp
      SCHEME_NAME: DemoApp

    steps:
      - uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#V}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Select Latest Xcode
        run: |
          sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      # ---------- 修补 1.swift 以修复类型检查超时 ----------
      - name: Patch 1.swift to avoid type-check timeout
        run: |
          python3 <<'PYEOF'
          import re

          with open("1.swift", "r") as f:
              content = f.read()

          # 提取 MessageBubbleView 内部复杂 VStack 为独立计算属性
          old_block = """            VStack(alignment: .leading, spacing: 8) {
                          MessageWebView(content: message.content, isDark: isDark, height: $webViewHeight)
                              .frame(height: max(40, webViewHeight))

                          if let attachments = message.attachments, !attachments.isEmpty {
                              ScrollView(.horizontal, showsIndicators: false) {
                                  HStack(spacing: 8) {
                                      ForEach(attachments) { att in
                                          if att.isImage, let url = att.fullDataUrl, let data = try? Data(contentsOf: URL(string: url)!), let uiImage = UIImage(data: data) {
                                              Image(uiImage: uiImage)
                                                  .resizable()
                                                  .scaledToFill()
                                                  .frame(width: 80, height: 80)
                                                  .clipShape(RoundedRectangle(cornerRadius: 8))
                                                  .overlay(RoundedRectangle(cornerRadius: 8).stroke(Color.gray.opacity(0.3), lineWidth: 1))
                                          } else {
                                              HStack(spacing: 4) {
                                                  Image(systemName: "doc")
                                                      .font(.caption)
                                                  Text(att.name)
                                                      .font(.caption)
                                                      .lineLimit(1)
                                              }
                                              .padding(.horizontal, 8)
                                              .padding(.vertical, 4)
                                              .background(Color.gray.opacity(0.15))
                                              .clipShape(RoundedRectangle(cornerRadius: 6))
                                          }
                                      }
                                  }
                                  .padding(.vertical, 4)
                              }
                          }

                          if let images = message.generatedImages, !images.isEmpty {
                              ScrollView(.horizontal, showsIndicators: false) {
                                  HStack(spacing: 8) {
                                      ForEach(images, id: \.self) { img in
                                          if let data = try? Data(contentsOf: URL(string: img)!), let uiImage = UIImage(data: data) {
                                              Image(uiImage: uiImage)
                                                  .resizable()
                                                  .scaledToFill()
                                                  .frame(width: 120, height: 120)
                                                  .clipShape(RoundedRectangle(cornerRadius: 8))
                                                  .overlay(RoundedRectangle(cornerRadius: 8).stroke(Color.gray.opacity(0.3), lineWidth: 1))
                                          }
                                      }
                                  }
                                  .padding(.vertical, 4)
                              }
                          }
                      }"""

          new_block = "messageContent"  # 替换为简单调用

          if old_block in content:
              content = content.replace(old_block, new_block)
          else:
              print("Warning: Could not find the VStack block to replace. Build may still fail.")

          # 在 body 之前插入拆分的计算属性
          insertion = """
              private var messageContent: some View {
                  VStack(alignment: .leading, spacing: 8) {
                      MessageWebView(content: message.content, isDark: isDark, height: $webViewHeight)
                          .frame(height: max(40, webViewHeight))

                      if let attachments = message.attachments, !attachments.isEmpty {
                          attachmentsScrollView(attachments)
                      }

                      if let images = message.generatedImages, !images.isEmpty {
                          generatedImagesScrollView(images)
                      }
                  }
              }

              private func attachmentsScrollView(_ attachments: [Attachment]) -> some View {
                  ScrollView(.horizontal, showsIndicators: false) {
                      HStack(spacing: 8) {
                          ForEach(attachments) { att in
                              if att.isImage, let url = att.fullDataUrl, let data = try? Data(contentsOf: URL(string: url)!), let uiImage = UIImage(data: data) {
                                  Image(uiImage: uiImage)
                                      .resizable()
                                      .scaledToFill()
                                      .frame(width: 80, height: 80)
                                      .clipShape(RoundedRectangle(cornerRadius: 8))
                                      .overlay(RoundedRectangle(cornerRadius: 8).stroke(Color.gray.opacity(0.3), lineWidth: 1))
                              } else {
                                  HStack(spacing: 4) {
                                      Image(systemName: "doc").font(.caption)
                                      Text(att.name).font(.caption).lineLimit(1)
                                  }
                                  .padding(.horizontal, 8).padding(.vertical, 4)
                                  .background(Color.gray.opacity(0.15))
                                  .clipShape(RoundedRectangle(cornerRadius: 6))
                              }
                          }
                      }
                      .padding(.vertical, 4)
                  }
              }

              private func generatedImagesScrollView(_ images: [String]) -> some View {
                  ScrollView(.horizontal, showsIndicators: false) {
                      HStack(spacing: 8) {
                          ForEach(images, id: \.self) { img in
                              if let data = try? Data(contentsOf: URL(string: img)!), let uiImage = UIImage(data: data) {
                                  Image(uiImage: uiImage)
                                      .resizable()
                                      .scaledToFill()
                                      .frame(width: 120, height: 120)
                                      .clipShape(RoundedRectangle(cornerRadius: 8))
                                      .overlay(RoundedRectangle(cornerRadius: 8).stroke(Color.gray.opacity(0.3), lineWidth: 1))
                              }
                          }
                      }
                      .padding(.vertical, 4)
                  }
              }

          """

          # 找到 struct MessageBubbleView 的 body 定义行，并在其上方插入
          body_pattern = r"(    var body: some View \{)"
          insertion_point = re.search(body_pattern, content)
          if insertion_point:
              idx = insertion_point.start()
              content = content[:idx] + insertion + "\n" + content[idx:]
          else:
              print("Warning: Could not locate 'var body' in MessageBubbleView. Insertion skipped.")

          with open("1.swift", "w") as f:
              f.write(content)

          print("Patching completed successfully.")
          PYEOF

      - name: Create Info.plist
        run: |
          cat > Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>

          <key>CFBundleExecutable</key>
          <string>$(EXECUTABLE_NAME)</string>

          <key>CFBundleIdentifier</key>
          <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>

          <key>CFBundleName</key>
          <string>$(PRODUCT_NAME)</string>

          <key>CFBundlePackageType</key>
          <string>APPL</string>

          <key>CFBundleShortVersionString</key>
          <string>${{ steps.version.outputs.version }}</string>

          <key>CFBundleVersion</key>
          <string>1</string>

          <key>LSRequiresIPhoneOS</key>
          <true/>

          <key>UIDeviceFamily</key>
          <array>
              <integer>1</integer>
          </array>

          <key>UIRequiresFullScreen</key>
          <true/>

          <key>UILaunchScreen</key>
          <dict/>

          <key>UIApplicationSceneManifest</key>
          <dict>
              <key>UIApplicationSupportsMultipleScenes</key>
              <false/>
          </dict>

          <key>UISupportedInterfaceOrientations</key>
          <array>
              <string>UIInterfaceOrientationPortrait</string>
          </array>

          </dict>
          </plist>
          EOF

      - name: Create project.yml
        run: |
          cat > project.yml <<'EOF'
          name: DemoApp

          options:
            bundleIdPrefix: com.example

          targets:
            DemoApp:
              type: application
              platform: iOS

              deploymentTarget:
                iOS: "18.0"

              sources:
                - path: .
                  includes:
                    - "1.swift"

              settings:
                base:
                  INFOPLIST_FILE: Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.example.demoapp
                  SWIFT_VERSION: "6.0"
                  SWIFT_STRICT_CONCURRENCY: "minimal"
                  OTHER_SWIFT_FLAGS: "$(inherited) -Xfrontend -disable-actor-data-race-checks"
                  SWIFT_OPTIMIZATION_LEVEL: "-Onone"

                  TARGETED_DEVICE_FAMILY: "1"

                  SUPPORTS_MACCATALYST: NO

                  SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

                  GENERATE_INFOPLIST_FILE: NO

                  IPHONEOS_DEPLOYMENT_TARGET: "18.0"
          EOF

      - name: Generate Project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project DemoApp.xcodeproj \
            -scheme DemoApp \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath build

      - name: Zip App
        id: zip
        run: |
          APP=$(find build -name "*.app" | head -1)

          zip -r DemoApp.zip "$APP"

          echo "file=DemoApp.zip" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.file }}
