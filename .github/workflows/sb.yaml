name: Build & Release Universal Simulator App

on:
  push:
    tags:
      - 'V*'

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      APP_NAME: DemoApp
      SCHEME_NAME: DemoApp
      PROJECT_NAME: DemoApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#V}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install xcodegen
        run: brew install xcodegen

      # 通用 Info.plist：同时支持 iPhone 和 iPad
      - name: Create universal Info.plist
        run: |
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ steps.version.outputs.version }}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <!-- 同时包含 1(iPhone) 和 2(iPad) -->
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <!-- iPhone 方向 -->
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <!-- iPad 额外方向 -->
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Generate project.yml
        run: |
          cat > project.yml << 'EOF'
          name: DemoApp
          options:
            bundleIdPrefix: com.example
            deploymentTarget:
              iOS: "16.0"
          targets:
            DemoApp:
              type: application
              platform: iOS
              sources:
                - path: .
                  includes:
                    - "1.swift"
              settings:
                base:
                  INFOPLIST_FILE: Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.example.demoapp
                  SWIFT_VERSION: "5.0"
                  TARGETED_DEVICE_FAMILY: "1,2"   # 保证编译时也传入设备族
          EOF

      - name: Generate Xcode project and fix format
        run: |
          xcodegen generate --spec project.yml
          sed -i '' 's/objectVersion = 77;/objectVersion = 56;/g' DemoApp.xcodeproj/project.pbxproj

      - name: Build for iOS Simulator (universal)
        run: |
          xcodebuild \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME_NAME" \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package as ZIP
        id: package
        run: |
          APP_PATH=$(find ./build/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::.app not found"
            exit 1
          fi
          ZIP_NAME="$APP_NAME-${{ steps.version.outputs.version }}-simulator.zip"
          zip -r "$ZIP_NAME" "$APP_PATH"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.package.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
