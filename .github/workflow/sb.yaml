name: Release Simulator Build

on:
  push:
    tags:
      - 'V*'                # 仅匹配以大写 V 开头的 tag，例如 V1.0.0

jobs:
  build-and-release:
    runs-on: macos-14       # 使用最新 macOS 环境（M1），也可用 macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 提取版本号（去掉前缀 V）
      - name: Extract version
        id: version
        run: |
          TAG_NAME=${GITHUB_REF_NAME}           # 例如 V1.2.3
          VERSION=${TAG_NAME#V}                 # 去掉前缀 V，得到 1.2.3
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Build for iOS Simulator
        run: |
          # 请将 YourScheme 替换为你的 Xcode scheme 名称
          xcodebuild \
            -scheme YourScheme \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package as ZIP
        run: |
          APP_PATH=$(find ./build/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::App bundle not found"
            exit 1
          fi
          ZIP_NAME="YourApp-${{ steps.version.outputs.version }}-simulator.zip"
          zip -r "$ZIP_NAME" "$APP_PATH"
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
        id: package

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.package.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
